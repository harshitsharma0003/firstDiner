name: firstdiner
description: firstDiner — book weeknight restaurant deals.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  google_fonts: ^6.2.1   # Inter (UI) + Fraunces (display), matching the web console

  # Production phone auth (see lib/api_client.dart + lib/screens/login.dart).
  # `flutterfire configure` may bump these to versions matching your Flutter SDK.
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.0

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
