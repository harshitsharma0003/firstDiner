# Render Blueprint — deploys the whole firstDiner stack:
#   1. firstdiner-api  — the Node backend (web service)
#   2. firstdiner-web  — the admin + restaurant console (static site)
# https://render.com  →  New +  →  Blueprint  →  connect this repo.
#
# Two manual steps after the first deploy (see DEPLOY.md):
#   - add the Firebase service-account key to firstdiner-api as a Secret File
#   - set VITE_API_BASE on firstdiner-web to the api URL + /api, then redeploy
services:
  - type: web
    name: firstdiner-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Use Firestore (the seeded prod data lives there already).
      - key: DATA_STORE
        value: firestore
      # Production customer auth is Firebase phone auth; disable the dev OTP path.
      - key: EXPOSE_OTP
        value: "false"
      # Demo bypass number (+919968225190 / 123456). Set to "false" for real launch.
      - key: DEMO_LOGIN
        value: "true"
      # Points firebase-admin at the Secret File you add in the dashboard.
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/service-account.json
      # Render generates a strong secret for signing app JWTs.
      - key: JWT_SECRET
        generateValue: true
      # Email — set in the dashboard to enable password-reset + booking emails.
      # Recommended: your Hostinger SMTP mailbox (sends from your own domain).
      - key: SMTP_HOST        # e.g. smtp.hostinger.com
        sync: false
      - key: SMTP_PORT        # 465
        sync: false
      - key: SMTP_USER        # e.g. no-reply@thefirstdiner.com
        sync: false
      - key: SMTP_PASS        # that mailbox's password
        sync: false
      - key: EMAIL_FROM       # First Diner <no-reply@thefirstdiner.com>
        sync: false
      - key: ADMIN_EMAIL      # admin address for password reset
        sync: false
      # Alternative to SMTP: Resend API key.
      - key: RESEND_API_KEY
        sync: false

  # Admin + restaurant console (one React app, role-switched at login).
  - type: web
    name: firstdiner-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the firstdiner-api URL + /api after the first deploy,
      # e.g. https://firstdiner-api.onrender.com/api
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
