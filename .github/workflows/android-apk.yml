name: Build Android APK

# Builds an installable APK in the cloud. GitHub's runners are Linux, so this
# sidesteps the local Windows AF_UNIX/Gradle issue entirely.
#
# Triggers:
#   - every push to main that touches the app (mobile/** or this file)
#   - manually from the Actions tab (choose release or debug)
#
# The APK is uploaded as a build artifact you can download and install on a
# phone. It is debug-signed (the Flutter template signs release with the debug
# key), so it installs fine; Firebase TEST phone numbers work regardless of the
# signing key. For real phone numbers on a distributed build, add a stable
# release keystore + its SHA-1 in Firebase (ask and I'll wire it in via secrets).

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        type: choice
        options: [ release, debug ]
        default: release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --${{ github.event.inputs.mode || 'release' }} --build-number=${{ github.run_number }}

      - name: Name APK with build number
        run: |
          MODE="${{ github.event.inputs.mode || 'release' }}"
          cp "build/app/outputs/flutter-apk/app-${MODE}.apk" "firstDiner-${MODE}-b${{ github.run_number }}.apk"
          ls -lh firstDiner-*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: firstDiner-apk-b${{ github.run_number }}
          path: mobile/firstDiner-*.apk
          if-no-files-found: error
          retention-days: 30
